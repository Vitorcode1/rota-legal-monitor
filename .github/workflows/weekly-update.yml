name: Weekly Update

on:
  schedule:
    # Todo domingo as 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      country:
        description: 'Codigo do pais (nl, pt, de, es, ie). Vazio = todos.'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate current data
        run: bun run validate

      - name: Run extraction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5
          NODE_ENV: production
        run: |
          if [ -n "${{ inputs.country }}" ]; then
            bun run extract --country=${{ inputs.country }}
          else
            bun run extract
          fi

      - name: Detect changes
        id: diff
        run: bun run diff > diff-output.md
        continue-on-error: true

      - name: Open issue if relevant changes detected
        if: steps.diff.outputs.has_high_relevance == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Mudanca detectada na semana de $(date +%Y-%m-%d)" \
            --body-file diff-output.md \
            --label "data-update,relevance/high"

      - name: Commit and push
        run: |
          git config user.name "rota-legal-bot"
          git config user.email "rota-legal-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nenhuma mudanca para comitar"
          else
            git commit -m "chore(data): weekly snapshot $(date +%Y-%m-%d)"
            git push origin main
          fi
