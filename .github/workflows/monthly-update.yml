name: Monthly Update


on:
  schedule:
    # Dia 1 de cada mes, as 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      country:
        description: 'Codigo do pais (nl, pt, de, es, ie, it, fr, be, at, au). Vazio = todos.'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Validate current data
        run: bun run validate

      - name: Run extraction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL_DEFAULT: claude-haiku-4-5
          ANTHROPIC_MODEL_PREMIUM: claude-sonnet-4-5
          NODE_ENV: production
        run: |
          COUNTRY="${{ inputs.country }}"
          if [ -n "$COUNTRY" ]; then
            bun run extract "--country=$COUNTRY"
          else
            bun run extract
          fi

      - name: Generate index.json
        run: bun run index

      - name: Detect changes
        id: diff
        run: bun run diff > diff-output.md
        continue-on-error: true

      - name: Open issue if relevant changes detected
        if: steps.diff.outputs.has_high_relevance == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "data-update"    --color "0075ca" --description "Dados extraidos atualizados" --force 2>/dev/null || true
          gh label create "relevance/high" --color "e11d48" --description "Mudanca de alta relevancia"   --force 2>/dev/null || true
          # GitHub limita corpo de issue a 65536 chars
          if [ $(wc -c < diff-output.md) -gt 65000 ]; then
            { head -c 65000 diff-output.md; printf '\n\n_(diff truncado - ver data/current/ para detalhes completos)_'; } > diff-truncated.md
            mv diff-truncated.md diff-output.md
          fi
          gh issue create \
            --title "Mudanca detectada em $(date +%Y-%m-%d)" \
            --body-file diff-output.md \
            --label "data-update,relevance/high"

      - name: Commit and push
        run: |
          git config user.name  "rota-legal-bot"
          git config user.email "rota-legal-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nenhuma mudanca para comitar"
          else
            git commit -m "chore(data): monthly snapshot $(date +%Y-%m-%d)"
            git push origin master
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data/current
          publish_branch: gh-pages
          exclude_assets: 'example.json'
          commit_message: 'chore(pages): deploy data snapshot ${{ github.run_id }}'

      - name: Cleanup temp files
        if: always()
        run: rm -f diff-output.md
