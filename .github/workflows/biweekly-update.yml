name: Biweekly Update

on:
  schedule:
    # Dia 1 e 15 de cada mes, as 06:00 UTC
    - cron: '0 6 1,15 * *'
  workflow_dispatch:
    inputs:
      country:
        description: 'Codigo do pais (nl, pt, de, es, ie). Vazio = todos.'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Validate current data
        run: bun run validate

      - name: Run extraction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5
          NODE_ENV: production
        run: |
          COUNTRY="${{ inputs.country }}"
          if [ -n "$COUNTRY" ]; then
            bun run extract "--country=$COUNTRY"
          else
            bun run extract
          fi

      - name: Detect changes
        id: diff
        run: bun run diff > diff-output.md
        continue-on-error: true

      - name: Open issue if relevant changes detected
        if: steps.diff.outputs.has_high_relevance == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "data-update"   --color "0075ca" --description "Dados extraidos atualizados" --force 2>/dev/null || true
          gh label create "relevance/high" --color "e11d48" --description "Mudanca de alta relevancia"   --force 2>/dev/null || true
          gh issue create \
            --title "[Dados] Mudanca detectada em $(date +%Y-%m-%d)" \
            --body-file diff-output.md \
            --label "data-update,relevance/high"

      - name: Commit and push
        run: |
          git config user.name  "rota-legal-bot"
          git config user.email "rota-legal-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nenhuma mudanca para comitar"
          else
            git commit -m "chore(data): biweekly snapshot $(date +%Y-%m-%d)"
            git push origin master
          fi

      - name: Cleanup temp files
        if: always()
        run: rm -f diff-output.md
